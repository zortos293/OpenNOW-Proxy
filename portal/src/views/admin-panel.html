<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Panel — OpenNOW Proxy</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, Segoe UI, sans-serif; }
      body { margin: 0; background: #0b1020; color: #e8eefc; padding: 24px; }
      .wrap { max-width: 1100px; margin: 0 auto; }
      header { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
      h1 { margin: 0; font-size: 1.6rem; }
      .meta { color: #8ea0cc; }
      .card { background: #141b2d; border: 1px solid #24304d; border-radius: 16px; padding: 24px; margin-bottom: 24px; }
      h2 { margin: 0 0 16px; font-size: 1.1rem; }
      label { display: block; margin-bottom: 6px; color: #8ea0cc; font-size: .9rem; }
      input { background: #0b1020; color: #e8eefc; border: 1px solid #24304d; border-radius: 10px; padding: 10px; font: inherit; width: 100%; box-sizing: border-box; }
      .form-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; align-items: end; }
      button, .logout { background: #76b900; color: #081006; border: 0; border-radius: 10px; padding: 10px 16px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; }
      .logout { background: #24304d; color: #e8eefc; }
      .danger { background: #5c1f1f; color: #ffd6d6; padding: 8px 12px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #24304d; vertical-align: top; }
      th { color: #8ea0cc; font-size: .85rem; text-transform: uppercase; letter-spacing: .04em; }
      td input { min-width: 280px; }
      .message { color: #76b900; }
      .error { color: #ff8a8a; }
      code { background: #0b1020; padding: 2px 6px; border-radius: 6px; }
      @media (max-width: 800px) {
        .form-grid { grid-template-columns: 1fr; }
        td input { min-width: 0; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1>OpenNOW Proxy Admin</h1>
          <div class="meta">Active users: {{activeUsers}} · Endpoint: <code>{{proxyHost}}:{{proxyPort}}</code></div>
        </div>
        <form method="post" action="/admin/logout">
          <button class="logout" type="submit">Sign out</button>
        </form>
      </header>

      {{message}}
      {{error}}

      <section class="card">
        <h2>Create proxy user</h2>
        <form method="post" action="/admin/users" class="form-grid">
          <div>
            <label for="username">Proxy username</label>
            <input id="username" name="username" placeholder="opennow-user1" required />
          </div>
          <div>
            <label for="password">Proxy password</label>
            <input id="password" name="password" type="text" placeholder="your-fixed-password" required />
          </div>
          <button type="submit">Create</button>
        </form>
      </section>

      <section class="card">
        <h2>Proxy users</h2>
        <p class="meta">Paste the OpenNOW URL into Settings → Video → Session proxy.</p>
        <table>
          <thead>
            <tr>
              <th>Username</th>
              <th>Password</th>
              <th>OpenNOW URL</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {{rows}}
          </tbody>
        </table>
      </section>
    </div>
  </body>
</html>
