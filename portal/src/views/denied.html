<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sponsorship Required</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, Segoe UI, sans-serif; }
      body { margin: 0; min-height: 100vh; background: #0b1020; color: #e8eefc; display: grid; place-items: center; padding: 24px; }
      .card { max-width: 640px; width: 100%; background: #141b2d; border: 1px solid #24304d; border-radius: 16px; padding: 32px; }
      h1 { margin: 0 0 12px; }
      p { line-height: 1.6; color: #b8c4e6; }
      a.button { display: inline-block; margin-top: 20px; background: #76b900; color: #081006; text-decoration: none; font-weight: 700; padding: 12px 18px; border-radius: 10px; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Sponsorship required</h1>
      <p>Signed in as <strong>{{githubName}}</strong> (@{{githubLogin}}), but no active GitHub Sponsorship was found for <strong>{{sponsorLogin}}</strong>.</p>
      <p>Become a sponsor to receive OpenNOW session proxy credentials.</p>
      <a class="button" href="{{sponsorPageUrl}}" target="_blank" rel="noreferrer">Sponsor on GitHub</a>
    </main>
  </body>
</html>
