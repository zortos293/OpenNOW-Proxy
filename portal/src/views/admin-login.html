<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login — OpenNOW Proxy</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, Segoe UI, sans-serif; }
      body { margin: 0; min-height: 100vh; background: #0b1020; color: #e8eefc; display: grid; place-items: center; padding: 24px; }
      .card { max-width: 420px; width: 100%; background: #141b2d; border: 1px solid #24304d; border-radius: 16px; padding: 32px; }
      h1 { margin: 0 0 8px; font-size: 1.5rem; }
      p { color: #b8c4e6; line-height: 1.5; }
      label { display: block; margin-top: 16px; margin-bottom: 6px; color: #8ea0cc; font-size: .9rem; }
      input { width: 100%; box-sizing: border-box; background: #0b1020; color: #e8eefc; border: 1px solid #24304d; border-radius: 10px; padding: 12px; font: inherit; }
      button { margin-top: 20px; width: 100%; background: #76b900; color: #081006; border: 0; border-radius: 10px; padding: 12px; font-weight: 700; cursor: pointer; }
      .error { color: #ff8a8a; margin-top: 12px; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Admin login</h1>
      <p>OpenNOW session proxy management</p>
      {{error}}
      <form method="post" action="/admin/login">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" required />
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
        <button type="submit">Sign in</button>
      </form>
    </main>
  </body>
</html>
