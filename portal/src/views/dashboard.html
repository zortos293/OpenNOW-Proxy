<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenNOW Proxy Credentials</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, Segoe UI, sans-serif; }
      body { margin: 0; min-height: 100vh; background: #0b1020; color: #e8eefc; display: grid; place-items: center; padding: 24px; }
      .card { max-width: 760px; width: 100%; background: #141b2d; border: 1px solid #24304d; border-radius: 16px; padding: 32px; }
      h1 { margin: 0 0 8px; font-size: 1.7rem; }
      .user { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
      .avatar { width: 48px; height: 48px; border-radius: 50%; background: #24304d; object-fit: cover; }
      .tier { color: #76b900; font-weight: 600; margin-bottom: 16px; }
      label { display: block; font-size: .9rem; color: #8ea0cc; margin-bottom: 8px; }
      .url-box { display: flex; gap: 8px; }
      input, textarea { width: 100%; background: #0b1020; color: #e8eefc; border: 1px solid #24304d; border-radius: 10px; padding: 12px; font: inherit; }
      button { background: #76b900; color: #081006; border: 0; border-radius: 10px; padding: 12px 16px; font-weight: 700; cursor: pointer; white-space: nowrap; }
      ol { color: #b8c4e6; line-height: 1.7; padding-left: 20px; }
      form { margin-top: 24px; }
      .logout { background: #24304d; color: #e8eefc; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="user">
        <img class="avatar" src="{{avatarUrl}}" alt="" />
        <div>
          <h1>{{githubName}}</h1>
          <div>@{{githubLogin}}</div>
        </div>
      </div>
      <div class="tier">Sponsor tier: {{sponsorTier}}</div>

      <label for="proxy-url">OpenNOW session proxy URL</label>
      <div class="url-box">
        <input id="proxy-url" readonly value="{{proxyUrl}}" />
        <button type="button" onclick="copyUrl()">Copy</button>
      </div>

      <ol>
        <li>Open OpenNOW → Settings → Video</li>
        <li>Enable <strong>Session proxy</strong></li>
        <li>Paste the URL above into the proxy field</li>
      </ol>

      <p>Allowed upstream domains: <code>games.geforce.com</code> and <code>*.nvidiagrid.net</code> only.</p>
      <p>Proxy endpoint: <code>{{proxyHost}}:{{proxyPort}}</code></p>

      <form method="post" action="/auth/logout">
        <button class="logout" type="submit">Sign out</button>
      </form>
    </main>
    <script>
      function copyUrl() {
        const input = document.getElementById("proxy-url");
        input.select();
        input.setSelectionRange(0, input.value.length);
        navigator.clipboard.writeText(input.value);
      }
    </script>
  </body>
</html>
