# Bind portal + proxy to localhost for an external cloudflared (PM2/systemd on the host).
# Use with: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build

services:
  portal:
    ports:
      - "127.0.0.1:3010:3000"

  proxy:
    ports:
      - "127.0.0.1:3128:3128"

  caddy:
    profiles:
      - disabled
